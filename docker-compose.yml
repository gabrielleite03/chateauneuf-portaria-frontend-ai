services:
  backend:
    image: ${BACKEND_IMAGE:-gabrielleite03/chateauneuf-portaria-backend:latest}
    user: "0:0"
    build:
      context: ../chateauneuf-portaria-backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${BACKEND_APP_VERSION:-latest}
        GIT_COMMIT: ${BACKEND_GIT_COMMIT:-unknown}
    environment:
      HTTP_ADDR: :8080
      DATABASE_PATH: /app/data/portaria.db
      MIGRATIONS_PATH: /app/migrations
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:8081}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID:-}
      GOOGLE_SHEET_NAME: ${GOOGLE_SHEET_NAME:-Entradas}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_CREDENTIALS_FILE: /run/secrets/google-service-account.json
      PHOTO_STORAGE_DIR: /app/photos
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-30}
    volumes:
      - backend-data:/app/data
      - ${LOCAL_PHOTO_DIR:-./photos}:/app/photos
      - ./secrets:/run/secrets:ro
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-gabrielleite03/chateauneuf-portaria-frontend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${FRONTEND_APP_VERSION:-latest}
        GIT_COMMIT: ${FRONTEND_GIT_COMMIT:-unknown}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  backend-data:
